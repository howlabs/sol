    <rect x="60" y="18" width="8" height="16" rx="4" transform="rotate(90 64 64)"/>
    <rect x="60" y="18" width="8" height="16" rx="4" transform="rotate(135 64 64)"/>
    <rect x="60" y="18" width="8" height="16" rx="4" transform="rotate(180 64 64)"/>
    <rect x="60" y="18" width="8" height="16" rx="4" transform="rotate(225 64 64)"/>
    <rect x="60" y="18" width="8" height="16" rx="4" transform="rotate(270 64 64)"/>
